<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callback</title>
</head>
<body>
    <script>
        console.log("sync 1");

        setTimeout(()=>{
            console.log("async 1");
        });
        
        setTimeout(()=>{
            console.log("async 2");
        },Math.ramdom()*2000 + 1000);

        setTimeout(()=>{
            console.log("async 3");
        },Math.ramdom()*2000 + 2000);

        console.log("sync 2");

        console.log("sync 3");

        


    </script>
</body>
</html>
