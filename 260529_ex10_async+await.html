<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>async and await</title>
</head>
<body>
    <script type="module"> //A. module 안에 넣으면 async 밖에서도 await 사용가능.

        //B. 진입점을 async function으로 설정
        document.addEventListener("DOMContentLoaded", async function(){
            
        });
        
        //Promise 사용 시 new Promise((resolve, reject)=>{})... 했겠지만
        //async function은 resolve,reject를 사용하지 않고 반환 값만 사용한다.
        async function f1() {}
        const f2 = async function() {};
        setTimeout(()=>console.log("매크로테스크 큐"))

        const r1 = f1();
        const r2 = f2();
        const r3 = await f2().then (()=>"r3 (call stack)");
        // r2 >> 동기적 흐름을 가지고 call stack에 편입.
        r1.then(() => {console.log("r1 successed! (마이크로테스크 큐)")});
        console.log("call stack")
        r2.then(() => {console.log("r2 successed! (마이크로테스크 큐)")});
        // console.log(await r2) << await은 async 내부에서만 사용가능하다. 실행 흐름을 끊고 나중에 실행.
        console.log(r1)
        console.log(r2)
        console.log(r3)

    </script>
</body>
</html>
