<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hampter Memoboard</title>
    <style>
        /* 전체 공통으로 작동해야 하는 태그 수준의 서식 */
        *{
            box-sizing: border-box;
        }
        body {
            margin: 0px;
        }
        textarea {
            resize: none;
        }
        /* 반복해서 쓰이는 내용은 클래스로 작성 */
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* id를 의미하는 선택자 # */
        #page {
            height: 100vh;
            flex-direction: column;
        }
        #container {
            flex-direction: column;
        }
        #container h1{
            text-align: center;
        }

        #memoWriter{
            flex-direction: column;
            gap: 8px;
            background-color: beige;
            padding:16px;
            border: 1px solid gray;
            border-radius: 8px;
        }
        #memoWriter>button{
            padding: 8px 16px;
        }

        #memolist {
            gap: 8px;
            padding: 16px;
            /* flex-direction 기본값 row → 메모가 좌→우로 배치, wrap으로 줄바꿈 */
            flex-wrap: wrap;
        }

        #memolist div{  
            width: 240px;
            height: 160px;
            border: 1px solid gray;
            border-radius: 8px;
            padding: 8px;
            background-color: #FFF7c5;
        }
    </style>
</head>
<body>
    <!-- class="center"를 section에 부여해 flex 레이아웃 적용 -->
    <section id="page" class="center">
        <section id="container" class="center">
            <h1>Hampter Memoboard</h1>
            <!-- validation : 검증 -->
            <!-- 프런트엔드/브라우저에서의 검증은 모두 회피/조작 가능 -->
            <form id="memoWriter" class="center">
                <textarea name="memo" required></textarea>
                <button>submit</button>
            </form>
            <!-- 작성된 메모를 배치 -->
            <section id="memolist" class="center">

            </section>
        </section>
    </section>
    <script>
        document.addEventListener("DOMContentLoaded", main);

        // DOM 요소
        const memoWriter = document.querySelector("#memoWriter");
        const memoList = document.querySelector("#memolist");

        // 진입점. entrypoint
        function main() {
            console.log("DOM Loaded");
            memoWriter.addEventListener("submit", memoWriterHandler);
            // 이전에 저장된 메모를 화면에 표시
            drawPrevMemo();
        }

        function memoWriterHandler(event){
            // form의 기본 이벤트(새로고침 등)를 금지/정지
            event.preventDefault();

            console.log("form logic start");
            const formData = new FormData(event.target);
            // console.log(...formData);

            // FormData에서 "memo" 필드의 값 추출
            const memoText = formData.get("memo");
            console.log(memoText);

            // 데이터 추가 시 localStorage를 사용해 영속성(persistence) 확보
            saveMemo(memoText);

            // 추가할 텍스트로 메모 박스 그리기
            // memoList는 렉시컬 스코프로 기억하지만, memoText는 인자로 전달
            drawMemoBox(memoText);
        }

        // 특정 텍스트를 메모 박스로 만들어 memoList에 추가
        function drawMemoBox(memoText){
            const memobox = document.createElement("div");
            memobox.textContent = memoText;
            memoList.append(memobox);

            // 삭제 버튼 로직
            const removeBtn = document.createElement("button");
            removeBtn.textContent = "Remove";
            // 여기서 함수선언/표현을 하면 Lexical Scope로 바깥을 가져올 수 있다는 장점
            removeBtn.addEventListener("click", () => {
                // DOM에서 해당 메모 박스 제거
                memobox.remove();
                // TODO: localStorage에서도 해당 항목 삭제 필요
            });
            memobox.append(removeBtn);
        }

        function saveMemo(memoText){
            // localStorage.setItem("memo", memoText); // 최근 메모 1개만 저장
            // localStorage.setItem("memo", []);        // 배열도 가능하지만 삭제 시 번거로움
            // -> 객체(Object)로 저장해 키별 관리

            const prevMemo = localStorage.getItem("memo") ?? {};
            let memoObj;
            try{
                // JSON text -> 객체로 변환
                memoObj = JSON.parse(prevMemo);
                // localStorage는 origin(도메인+포트)을 공유
            }catch(err){
                console.log(err);
                memoObj = {};
            }
            // 현재 시간을 숫자(ms)로 표시한 값을 키로 사용
            const timeKey = Date.now();
            memoObj[timeKey] = memoText;
            console.log(memoObj);
            // localStorage는 문자열 key, value만 저장 가능
            // 객체를 문자열로 변환할 때 JSON.stringify, 반대는 JSON.parse 사용
            localStorage.setItem("memo", JSON.stringify(memoObj));
            return timeKey; //생성 후 id값 외부로 리턴
        }

        function drawPrevMemo(){
            // localStorage에서 데이터 빼오기
            let prevMemo;
            try {
                prevMemo = JSON.parse(localStorage.getItem("memo"));
            } catch {
                prevMemo = {};
            }
            // timeKey : 메모값 쌍을 순회
            console.log(prevMemo);
            // 각각 메모 박스 그리기
            for (const key in prevMemo) {
                drawMemoBox(prevMemo[key]);
            }
        }
    </script>
</body>
</html>
