<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Open Graph (미리보기) 설정 -->
    <meta property="og:title" content="HAMPTER MEMOBOARD">
    <meta property="og:description" content="WE HAVE HAMPTER, and WE HAVE MEMOBOARD. YOU WILL LOVE IT. TRY IT.">
    <meta property="og:image" content="./hampter_preview.png">
    <meta property="og:type" content="website">
    
    <!-- Favicon 설정 -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <title>Hampter Memoboard</title>
    <!-- Use Quicksand font as per DESIGN.md -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }
        body {
            margin: 0;
            background-color: #4E342E; /* Walnut Brown background for the outside frame */
            color: #4E342E; /* Walnut Brown text inside */
            display: flex;
            justify-content: center;
        }
        textarea {
            resize: none;
            font-family: 'Quicksand', sans-serif;
        }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #page {
            width: 100%;
            max-width: 1200px; /* Centered max 1200px container */
            min-height: 100vh;
            background-color: #FFF8E1; /* Cream base for the content */
            flex-direction: column;
            padding: 40px 24px;
            /* 좌우 보더라인으로 프레임/포커스 효과 */
            border-left: 16px solid #3E2924;
            border-right: 16px solid #3E2924;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        
        #container {
            flex-direction: column;
            width: 100%;
            align-items: center;
            gap: 24px;
        }
        
        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 32px;
            margin: 0;
            color: #4E342E;
        }

        /* Buttons (Pill shapes, Sunflower yellow) */
        button {
            padding: 8px 24px;
            border-radius: 9999px; /* Pill */
            border: none;
            background-color: #FFC107; /* Sunflower Yellow */
            color: #4E342E;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(78, 52, 46, 0.1); /* Soft brown shadow */
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(78, 52, 46, 0.15);
        }
        button:active {
            transform: translateY(0);
        }
        
        .header-actions {
            display: flex;
            gap: 16px;
        }
        
        .header-actions a {
            text-decoration: none;
        }
        
        /* Secondary buttons */
        .btn-secondary {
            background-color: transparent;
            border: 2px solid #FF9800; /* Fur-orange border */
            color: #4E342E;
            box-shadow: none;
        }

        /* Reset/Delete buttons */
        .btn-danger {
            background-color: #FF8A80; /* Soft Pink */
            color: white;
        }

        /* Copy buttons */
        .btn-success {
            background-color: #81C784; /* Mint Green */
            color: white;
        }

        /* Form (The Pouch) */
        #memoWriter {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #FFE0B2; /* Peach / soft orange pouch */
            padding: 24px;
            border-radius: 32px; /* Large radius */
            width: 100%;
            max-width: 600px;
            box-shadow: inset 0 4px 12px rgba(78, 52, 46, 0.08); /* Inset shadow */
        }
        
        #memoWriter textarea {
            width: 100%;
            height: 100px;
            border-radius: 16px;
            border: 1px solid #FFB74D;
            background-color: #FFFDE7; /* Cream-tinted input background */
            padding: 16px;
            font-size: 16px;
            color: #4E342E;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        #memoWriter textarea:focus {
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.3); /* Primary yellow glow */
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Memo List */
        #memolist {
            width: 100%;
            display: flex;
            gap: 24px;
            padding: 24px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Card (Pure white, 32px radius) */
        .memo-card {
            width: 280px;
            height: auto;
            min-height: 200px;
            background-color: #FFFFFF; /* Pure White */
            border-radius: 32px; /* 32px corner radius */
            padding: 24px; /* Generous padding */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 24px rgba(78, 52, 46, 0.08); /* Soft brown-tinted shadow */
            transition: transform 0.2s;
        }
        
        .memo-card:hover {
            transform: translateY(-4px);
        }

        .memo-text {
            flex-grow: 1;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 16px;
            font-size: 16px;
            line-height: 1.5; /* Generous line height */
        }

        .card-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .card-actions button {
            padding: 6px 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <section id="page" class="center">
        <section id="container" class="center">
            <h1>Hampter Memoboard</h1>
            
            <div class="header-actions">
                <a href="index.html">
                    <button class="btn-secondary" type="button">Go to Main</button>
                </a>
            </div>

            <form id="memoWriter">
                <textarea name="memo" placeholder="Write your memo here..." required></textarea>
                <div class="form-actions">
                    <button type="submit">Submit</button>
                    <button id="resetBtn" class="btn-danger" type="button">Reset All</button>
                </div>
            </form>

            <section id="memolist">
                <!-- Memos will be placed here -->
            </section>
        </section>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", main);

        // DOM Elements
        const memoWriter = document.querySelector("#memoWriter");
        const memoList = document.querySelector("#memolist");
        const resetBtn = document.querySelector("#resetBtn");

        function main() {
            console.log("DOM Loaded");
            memoWriter.addEventListener("submit", memoWriterHandler);
            
            // Reset All Button
            resetBtn.addEventListener("click", () => {
                if(confirm("Are you sure you want to clear all memos?")) {
                    localStorage.removeItem("memo");
                    drawPrevMemo();
                }
            });

            // Initial render
            drawPrevMemo();
        }

        function memoWriterHandler(event){
            event.preventDefault();
            console.log("Form logic start");
            const formData = new FormData(event.target);
            const memoText = formData.get("memo");

            // Save and get ID
            const id = saveMemo(memoText);

            // Draw card with ID
            drawMemoBox(memoText, id);

            // Reset form input
            event.target.reset();
        }

        function drawMemoBox(memoText, id){
            const memobox = document.createElement("div");
            memobox.className = "memo-card";

            const textDiv = document.createElement("div");
            textDiv.className = "memo-text";
            textDiv.textContent = memoText;
            memobox.append(textDiv);

            const actionsDiv = document.createElement("div");
            actionsDiv.className = "card-actions";

            // Copy button
            const cpBtn = document.createElement("button");
            cpBtn.textContent = "Copy";
            cpBtn.className = "btn-success";
            cpBtn.addEventListener("click", () => {
                if (confirm("Copy this memo to clipboard?")) {
                    navigator.clipboard.writeText(memoText);
                    alert("Copied!");
                }
            });

            // Remove button
            const rmBtn = document.createElement("button");
            rmBtn.textContent = "Remove";
            rmBtn.className = "btn-danger";
            rmBtn.addEventListener("click", () => {
                const memoObj = getPrevMemo();
                memoObj[id] = undefined; // Marking as undefined removes it in JSON.stringify
                localStorage.setItem("memo", JSON.stringify(memoObj));
                memobox.remove(); // Remove DOM element
            });

            actionsDiv.append(cpBtn);
            actionsDiv.append(rmBtn);
            memobox.append(actionsDiv);
            
            memoList.append(memobox);
        }

        function saveMemo(memoText){
            const memoObj = getPrevMemo();
            const timeKey = Date.now();
            memoObj[timeKey] = memoText;
            localStorage.setItem("memo", JSON.stringify(memoObj));
            return timeKey; // Return Key (ID)
        }

        function getPrevMemo() {
            const prevMemo = localStorage.getItem("memo") ?? "{}";
            let memoObj;
            try {
                memoObj = JSON.parse(prevMemo);
            } catch (err) {
                console.log(err);
                memoObj = {};
            }
            return memoObj;
        }

        function drawPrevMemo(){
            const prevMemo = getPrevMemo();
            memoList.innerHTML = ""; // Clear existing elements for re-rendering
            for (const key in prevMemo) {
                if (prevMemo[key] !== undefined && prevMemo[key] !== null) {
                    drawMemoBox(prevMemo[key], key);
                }
            }
        }
    </script>
</body>
</html>
