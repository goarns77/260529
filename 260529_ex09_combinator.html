<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise Combinator</title>
</head>
<body>
    <script>
        const r1 = Promise.resolve().then(() => "r1");
      const r2 = Promise.reject(new Error("r2"));
      function r3() {
        return new Promise((resolve) => {
          return setTimeout(() => resolve("r3"), 1000 + Math.random() * 100);
        });
      }
      function r4() {
        return new Promise((_,reject) => {
          return setTimeout(() => {
            reject(new Error("r4"));
          }, 1000);
        });
      }

      // Promise.all
      Promise.all([r1, r2, r3(), r4()]) // 실패 있으면 X
        .then((v) => {
          console.log("성공 1");
          console.log(...v);
        })
        .catch((err) => {
          // 실패를 발생시킨 가장 앞선 것을 가져옴
          console.log("실패 1");
          console.log(err);
        });
      Promise.all([r1, r3()]) // 둘다 성공
        .then((v) => {
          console.log("성공 2");
          console.log(...v);
        }) // 모든 promise 결과를 가져옴
        .catch((err) => {
          console.log("실패 2");
          console.log(err);
        });

        //promise.allsettled
        Promise.allSettled([r1, r2, r3(), r4()])
        .then((v)=>{
          console.log("성공 3");
          console.log(...v) //성공한 결과값만 보여줌
        })
        .catch((err)=>{ //성공이 들어있는 이상 절대 catch 실행 X
          console.log("실패 3");
          console.log(err);
        });
        Promise.allSettled([r2, r4()]) // 둘다 실패
        .then((v) => {
          console.log("성공 4");
          console.log(...v); 
        })
        .catch((err) => { 
          console.log("실패 4");
          console.log(err);
        });

        //Promise.race
        Promise.race([r1, r2, r3(), r4()]) // 누가 먼저 이행되는지 확인
        .then((v)=> {
          console.log("성공 5"); //성공이 먼저라면
          console.log(...v); 
        })
        .catch((err) => { 
          console.log("실패 5"); //실패가 먼저라면
          console.log(err); 
        });

        //Promise.any
        Promise.any([r1, r2, r3(), r4()]) //모든 프로미스 완료 시 가장 먼저 성공한 값을 가져옴
        .then((v)=> {
          console.log("성공 7"); 
          console.log(...v); 
        })
        .catch((err) => { //모든 프로미스가 실패한 경우
          console.log("실패 7"); 
          console.log(err); 
        });

    </script>
</body>
</html>
