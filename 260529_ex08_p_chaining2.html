<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise Chaining</title>
</head>
<body>
    <script>
        function P1(){
            return new Promise(resolve => {
                return setTimeout(() => {
                    resolve(100);
                }, 1000)
            })
        }
        const p1 = P1();
        p1.then((v)=>{
            console.log(v);
        })
        //async, await
        //async->비동기 코드 실행 보장
        //await->동기처럼 보이지만 비동기 코드 실행
        
    </script>
</body>
</html>
