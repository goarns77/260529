<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise</title>
</head>
<body>
    <script>
        //callback의 2가지 문제 : 1.순서 보장 없음 2.예외 처리 안됨
        function f1(callback) {
            return new Promise((resolve,reject)=>{
                //성공 시 :
                setTimeout(() => {resolve();}, 1000);
                
            })
        }
        function f2(callback) {
            return new Promise((resolve,reject)=>{
                //실패 시 :
                reject(new Error("f2 failed"));
            })
        }
        const p1 = f1();
        const p2 = f2();
        console.log(p1);
        console.log(p2)
        
        f1().then(() => {console.log("successed")})
        .catch(()=>{console.log("failed")})

        f2().then(() => {console.log("successed")})
        .catch(() => {console.log("failed")})

    </script>
</body>
</html>
