<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hampter Memoboard</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body {
            margin: 0px;
        }
        textarea {
            resize: none;
        }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #page {
            height: 100vh;
            flex-direction: column;
        }
        #container h1{
            text-align: center;
        }

        #memoWriter{
            flex-direction: column;
            gap: 8px;
            background-color: beige;
            padding:16px;
            border: 1px solid gray;
            border-radius: 8px;
        }
        #memoWriter>button{
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <section id="page">
        <section id="containter">
            <title>
                <h1>Hampter Memoboard</h1>
            </title>
            <form id="memoWriter">
                <textarea name="memo"></textarea>
                <button>SUBMIT</button>
            </form>
        </section>
    </section>
</body>
</html>
