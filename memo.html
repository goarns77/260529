<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hampter Memoboard</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body {
            margin: 0px;
        }
        textarea {
            resize: none;
        }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #page {
            height: 100vh;
            flex-direction: column;
        }
        #memoWriter{
            flex-direction: column;
        }
    </style>
</head>
<body>
    <section id="page">
        <section id="containter">
            <title>Hampter Memoboard</title>
            <form id="memoWriter">
                <textarea name="memo"></textarea>
                <button>SUBMIT</button>
            </form>
        </section>
    </section>
</body>
</html>
